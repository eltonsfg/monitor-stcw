name: Monitor STCW — DRE + DGRM (Portugal)

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC diário = 09:00 Lisboa
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitor
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python -m scraper.main

      - name: Guardar resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add data/resultados.csv data/log.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: resultados $(date -u +%Y-%m-%d)"
          git push
