name: Monitor STCW — Acordo Marítimo Brasil-Portugal

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC diário = 09:00 Lisboa / 05:00 Brasília
  workflow_dispatch:        # execução manual a qualquer momento

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write       # necessário para git push dos resultados

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar monitor
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python -m scraper.main

      - name: Guardar resultados no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados.csv data/log.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: resultados $(date -u +%Y-%m-%d)"
          git push
